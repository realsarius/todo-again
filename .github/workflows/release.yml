name: Build And Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            package_type: dmg
            artifact_name: todo-again-macos
            artifact_glob: target/dist/*.dmg
          - os: windows-latest
            platform: windows
            package_type: msi
            artifact_name: todo-again-windows
            artifact_glob: target/dist/*.msi
          - os: ubuntu-latest
            platform: linux
            package_type: app-image
            artifact_name: todo-again-linux
            artifact_glob: target/dist/todo-again-linux-app-image.tar.gz
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install WiX Toolset
        if: matrix.platform == 'windows'
        shell: powershell
        run: choco install wixtoolset --no-progress -y

      - name: Build app jar and runtime dependencies
        run: mvn -B -DskipTests clean package dependency:copy-dependencies -DincludeScope=runtime

      - name: Build package with jpackage (macOS/Linux)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH="$(ls target/todo-again-*.jar | head -n 1)"
          JAR_FILE="$(basename "$JAR_PATH")"

          mkdir -p target/jpackage-input
          cp "$JAR_PATH" target/jpackage-input/
          cp target/dependency/*.jar target/jpackage-input/

          APP_VERSION="1.0.${GITHUB_RUN_NUMBER}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          fi

          jpackage \
            --type "${{ matrix.package_type }}" \
            --name "todo-again" \
            --dest target/dist \
            --input target/jpackage-input \
            --main-jar "$JAR_FILE" \
            --main-class yapilacaklarListesi.Main \
            --app-version "$APP_VERSION"

      - name: Build package with jpackage (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          $jarPath = (Get-ChildItem target/todo-again-*.jar | Select-Object -First 1).FullName
          $jarFile = Split-Path $jarPath -Leaf

          New-Item -ItemType Directory -Path target/jpackage-input -Force | Out-Null
          Copy-Item $jarPath target/jpackage-input/
          Copy-Item target/dependency/*.jar target/jpackage-input/

          $appVersion = "1.0.$env:GITHUB_RUN_NUMBER"
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $appVersion = $env:GITHUB_REF_NAME.Substring(1)
          }

          jpackage `
            --type "${{ matrix.package_type }}" `
            --name "todo-again" `
            --dest target/dist `
            --input target/jpackage-input `
            --main-jar $jarFile `
            --main-class yapilacaklarListesi.Main `
            --app-version $appVersion

      - name: Archive Linux app image
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf target/dist/todo-again-linux-app-image.tar.gz -C target/dist todo-again

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  create-release:
    needs: [build-packages]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-artifacts/todo-again-macos/*.dmg
            dist-artifacts/todo-again-windows/*.msi
            dist-artifacts/todo-again-linux/*.tar.gz
